name: Build y Deploy Base de Datos (Docker + EC2)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push de la imagen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/database:latest
          build-args: |
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}

      - name: Desplegar en la EC2 de datos (via ssh)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          proxy_host: ${{ secrets.BASTION_PUBLIC_IP }}
          proxy_key: ${{ secrets.BASTION_SSH_KEY }}
          proxy_username: ec2-user
          script: |
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/database:latest
            
            sudo docker stop database || true
            sudo docker rm database || true
            
            sudo docker run -d \
              --name database \
              -p 3306:3306 \
              -e MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} \
              -e MYSQL_DATABASE=proyecto_db \
              -v mysql_data:/var/lib/mysql \
              --restart always \
              ${{ secrets.DOCKERHUB_USERNAME }}/database:latest
              